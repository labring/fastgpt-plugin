name: Server Tests

on:
  pull_request:
    branches: ['**']
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - 'sdk/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-image.yml'
  push:
    branches: ['**']
    paths:
      - 'apps/server/**'
      - 'packages/**'
      - 'sdk/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/build-image.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: server-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Server
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test
