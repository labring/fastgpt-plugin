name: Build Connection Gateway

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-connection-gateway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Connection Gateway
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build package
        run: pnpm run build:connection-gateway

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: apps/connection-gateway/Dockerfile
          target: runner
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/fastgpt-plugin-connection-gateway:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=FastGPT Plugin Connection Gateway image
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=connection-gateway
          cache-to: type=gha,mode=max,scope=connection-gateway
