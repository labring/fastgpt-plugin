# FastGPT Tool Manifest
# 工具清单配置文件

type: 'tool'

# 工具 ID
toolId: 'my-tool'

# 标签
tags: []

# 工具名称（多语言支持）
name:
  en: '{{name}}'
  zh-CN: '{{name}}'

# 工具描述（多语言支持）
description:
  en: '{{description}}'
  zh-CN: '{{description}}'

# 工具详细描述（用于 AI 理解工具用途）
toolDescription:
  en: '{{toolDescription}}'
  zh-CN: '{{toolDescription}}'

# 版本号
version: '{{version}}'

# 版本描述（多语言支持）
versionDescription:
  en: '{{versionDescription}}'
  zh-CN: '{{versionDescription}}'

# 作者
author: '{{author}}'
# 图标（可选，若不填则会自动从目录中获取 logo.* 作为图标）
# icon: 'path/to/icon'

# 教程链接（可选）
# tutorialUrl: 'https://example.com/tutorial'

# 子工具列表（可选）
# 如果定义了 children，则此工具为工具集
# 子工具需要在 children/ 目录下定义
# children:
#   - tool1
#   - tool2
